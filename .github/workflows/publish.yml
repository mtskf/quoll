name: Publish Extension

on:
  push:
    tags:
      - 'v*'

# NOTE: This workflow is ACTIVE. On a pushed `v*` tag it packages one .vsix and publishes
# it to the VS Code Marketplace (VSCODE_PAT secret, required — configured). The Open VSX
# step (OPENVSX_PAT secret, optional) is skipped while that secret is unset, so releases
# currently go to the Marketplace only. The publisher ID (`mtskf`) matches
# `package.json.publisher`. Tag pushes trigger a LIVE publish (v0.1.0 shipped 2026-07-02),
# so never push a `v*` tag until you intend to release that version to users.

# Least-privilege GITHUB_TOKEN. Marketplace / Open VSX publishing uses the
# VSCODE_PAT / OPENVSX_PAT secrets, not the workflow token, so those stay
# read-only. The two write scopes below are required ONLY by the attestation
# steps: `id-token: write` mints the Sigstore OIDC token, `attestations: write`
# records the provenance + SBOM attestations in the repo's attestation store.
# (No `artifact-metadata: write` — that is only needed for registry storage
# records, which this file-subject attestation does not create.)
permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # All GitHub Actions are pinned to commit SHAs — supply-chain hardening.
      # The threat (tag remutation against a compromised maintainer / repo) applies
      # equally to first-party `actions/*` and third-party actions, so the same
      # policy covers both. When bumping, resolve the commit SHA with
      # `gh api repos/<owner>/<repo>/commits/<tag> --jq '.sha'` — this handles both
      # lightweight and annotated tags (e.g. `pnpm/action-setup` uses annotated tags,
      # and `git/refs/tags/<tag>` would return its tag-object SHA, not the commit).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install extension deps
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      # Release security gate. Fails the publish on High/Critical advisories
      # in the bundled runtime — every package esbuild bakes into
      # dist/extension.cjs / dist/webview/index.js lives in `dependencies`,
      # so `--prod` scans exactly the surface that ships in the .vsix.
      # Pure build/test tooling (Biome, Vitest, vsce, ovsx, esbuild, happy-dom,
      # @types/*, typescript) stays in `devDependencies` and is intentionally
      # excluded — those packages never reach a user. Approved exceptions
      # must be both documented in a dated release-security-audit note kept
      # with the project's private maintenance docs and added to the
      # `auditConfig.ignoreGhsas` array in pnpm-workspace.yaml (pnpm 11's bulk
      # advisory endpoint returns GHSA ids, not CVEs).
      - name: Audit production dependencies (security gate)
        run: pnpm audit --prod --audit-level=high

      - name: Build (webview + extension + esbuild bundle)
        run: pnpm build

      # Supply-chain transparency. Syft (v1.42.3, baked into the SHA-pinned
      # sbom-action release below; Dependabot bumps the action + its Syft
      # together — so we deliberately do NOT set `syft-version`, which would
      # drift from that baked default) catalogs the build's dependency graph
      # into an SPDX SBOM. This is the build-input graph (a superset that covers
      # every component esbuild bundles into the shipped `dist/`), NOT a
      # byte-for-byte manifest of the `--no-dependencies` .vsix. Runs only on tag
      # pushes and never ships in the .vsix.
      #
      # Ordered BEFORE packaging + the .vsix audit on purpose: this is the only
      # third-party action in the job and shares the runner workspace, so keeping
      # it ahead of the audit leaves that audit as the true last gate before the
      # (first-party) attest + publish steps — a compromised action here cannot
      # mutate an already-audited .vsix. It scans `path: .` (the dependency
      # graph), so it does not need the packaged .vsix to exist. Release-asset
      # upload is disabled — this job holds only `contents: read`; the SBOM is
      # kept as the sbom-action workflow artifact instead.
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Package .vsix
        run: pnpm exec vsce package --no-dependencies -o extension.vsix

      # Release gate. Inspects the just-packaged .vsix against an
      # allowlist (mirrors .vscodeignore) and fails the publish if
      # any internal file (docs/, .github/, .claude/, raw *.ts,
      # *.map, lockfiles, .env*, coverage, test fixtures) slipped
      # into the bundle. Tag pushes go live to Marketplace + Open
      # VSX — this is the last line of defence.
      - name: Audit .vsix contents
        run: node scripts/audit-vsix.mjs extension.vsix

      # Signed build provenance for the exact bytes we are about to publish, via
      # the unified actions/attest (Provenance mode = no sbom-path). GitHub has
      # folded the older attest-build-provenance / attest-sbom wrappers into this
      # action (attest-sbom is deprecated), so we use the canonical core action
      # for both legs. Attests extension.vsix against the workflow run through
      # Sigstore; consumers verify with
      # `gh attestation verify extension.vsix --repo mtskf/quoll`. Placed before
      # publish so an attestation failure blocks the release rather than shipping
      # an unattested artifact, and so the attested digest equals the bytes
      # handed to Marketplace + Open VSX.
      - name: Attest build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: extension.vsix

      # Bind the SBOM to the same .vsix digest (SBOM mode = sbom-path) so a
      # consumer can retrieve the dependency graph for the artifact they got.
      - name: Attest SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: extension.vsix
          sbom-path: sbom.spdx.json

      # Token is read implicitly from the VSCE_PAT env var — never passed as a
      # `-p <token>` CLI arg, so the secret cannot leak into process arguments.
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCODE_PAT }}
        run: pnpm exec vsce publish --no-dependencies --packagePath extension.vsix

      # Token is read implicitly from the OVSX_PAT env var (same rationale as above).
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OPENVSX_PAT }}
        if: ${{ env.OVSX_PAT != '' }}
        run: pnpm exec ovsx publish extension.vsix
