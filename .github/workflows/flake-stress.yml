# TEMPORARY investigation harness — DELETE before this branch merges.
# Reproduces (or rules out) the "systemic full-suite load-flake" on the real
# GitHub-hosted runner: runs `pnpm test:unit` in a loop across several shards so
# we get many independent CI samples in a single push, instead of relying on an
# overloaded dev box (which saw flakes only at load average ~242 = 30x overload).
name: flake-stress

on:
  push:
    branches: [test/full-suite-load-flake]

permissions:
  contents: read

jobs:
  stress:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      # SHAs mirror ci.yml (supply-chain: pin every action to a commit SHA).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.27.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Report runner CPU/mem
        run: |
          echo "nproc=$(nproc)"
          echo "cores=$(getconf _NPROCESSORS_ONLN)"
          free -h || true

      - name: Stress test:unit (10 iterations)
        run: |
          fails=0
          for i in $(seq 1 10); do
            echo "::group::shard ${{ matrix.shard }} iteration $i"
            if pnpm test:unit; then
              echo "shard ${{ matrix.shard }} iter $i: PASS"
            else
              echo "shard ${{ matrix.shard }} iter $i: FAIL"
              fails=$((fails + 1))
            fi
            echo "::endgroup::"
          done
          echo "=== shard ${{ matrix.shard }}: $fails failure(s) out of 10 ==="
          if [ "$fails" -ne 0 ]; then
            echo "::error::shard ${{ matrix.shard }} saw $fails/10 failing test:unit runs"
            exit 1
          fi
