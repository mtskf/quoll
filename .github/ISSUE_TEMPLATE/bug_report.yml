name: Bug report
description: Report a problem with Quoll
labels: ["bug"]
body:
  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      description: Help > About, or `code --version`
      placeholder: "1.9x.x"
    validations:
      required: true

  - type: input
    id: quoll-version
    attributes:
      label: Quoll version
      description: Extensions panel, or the version in package.json of the installed VSIX
      placeholder: "0.1.34"
    validations:
      required: true

  - type: textarea
    id: sample-markdown
    attributes:
      label: Sample .md snippet
      description: A minimal Markdown snippet that reproduces the issue, if applicable
      render: markdown
    validations:
      required: false

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: What did you do, in order?
      placeholder: |
        1. Open the sample snippet above in Quoll
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
