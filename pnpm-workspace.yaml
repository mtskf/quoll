# Supply-chain cooldown: refuse to install package versions published less than
# 7 days ago. npm account-takeover malware is typically detected and unpublished
# within hours-to-days, so this window sidesteps most of that blast radius.
# ⚠️ The cooldown gates LOCKED entries too, not just resolution: `pnpm install
# --frozen-lockfile` hard-fails with ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION on any
# locked version younger than the cutoff (verified 2026-07-24). Requires
# pnpm >= 10.16; unit is MINUTES.
#
# Escape hatch for an urgent security-fix bump that is itself younger than the
# window: add the package (name, glob, or name@version) to minimumReleaseAgeExclude
# below, install, and keep the entry until the release is OLDER than the window —
# removing it as soon as the pin lands in the lockfile breaks frozen-lockfile CI
# (see above). Prefer this over lifting the global setting.
minimumReleaseAge: 10080
# fast-uri@3.1.4 (published 2026-07-19) fixes a HIGH Dependabot alert but is
# still inside the 7-day cooldown as of this PR. Remove this entry once the
# release passes 2026-07-26 (age > minimumReleaseAge) — the `overrides:`
# pin below stays either way.
minimumReleaseAgeExclude:
  - fast-uri@3.1.4

# Security-motivated version overrides. pnpm 11 no longer reads the `pnpm`
# block from package.json — top-level `overrides:` here is its new home.
# Each entry forces a transitive dependency onto a patched floor; verify with
# `pnpm why <pkg>` after any bump that each still resolves to the pinned range.
overrides:
  undici: ^7.28.0
  form-data: ^4.0.6
  tmp: ^0.2.7
  js-yaml: ^4.2.0
  serialize-javascript: ^7.0.5
  fast-uri: ^3.1.4

# Approved audit exceptions land here (GHSA ids, not CVE — pnpm 11 uses the
# bulk advisory endpoint, which doesn't return CVE identifiers). Document each
# exception in a dated .claude/docs/security-audit/YYYY-MM-DD-*.md note before
# adding an entry. Empty today — no approved exceptions.
auditConfig:
  ignoreGhsas: []

# Dependencies with install/build (postinstall) scripts. Explicitly denied —
# this preserves pnpm 10's `onlyBuiltDependencies: []` (build nothing) semantics
# under pnpm 11, and keeps `pnpm install --frozen-lockfile` from erroring on
# ERR_PNPM_IGNORED_BUILDS. Flip an entry to `true` only if a package genuinely
# needs its build script to run for it to function. None do today: e.g. esbuild
# declares `postinstall: node install.js`, but denying it is safe — the platform
# binary is delivered via optionalDependencies (@esbuild/<platform>), and the
# postinstall only re-points/optimizes the bin, so esbuild runs without it.
allowBuilds:
  '@vscode/vsce-sign': false
  esbuild: false
  keytar: false
